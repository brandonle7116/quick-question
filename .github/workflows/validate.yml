name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: ShellCheck
        run: |
          brew install shellcheck
          find scripts -name '*.sh' -not -type l | xargs shellcheck -S error
          shellcheck -S error install.sh test.sh

      - name: JSON validity
        run: |
          python3 -m json.tool hooks/hooks.json > /dev/null
          python3 -m json.tool .claude-plugin/plugin.json > /dev/null
          python3 -m json.tool .claude-plugin/marketplace.json > /dev/null

      - name: Version consistency
        run: |
          PLUGIN_VER=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          CHANGELOG_VER=$(head -20 CHANGELOG.md | python3 -c "import re,sys; m=re.search(r'## \[(\d+\.\d+\.\d+)\]', sys.stdin.read()); print(m.group(1) if m else '')")
          if [ "$PLUGIN_VER" != "$CHANGELOG_VER" ]; then
            echo "::error::Version mismatch: plugin.json=$PLUGIN_VER, CHANGELOG=$CHANGELOG_VER"
            exit 1
          fi

      - name: Structural checks
        run: ./test.sh
